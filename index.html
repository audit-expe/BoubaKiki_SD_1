<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Similarity Task - stim64</title>
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-audio-keyboard-response@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.3"></script>
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.4.0"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  <style>
    body { background: #f8f8f8; }
    .task-box { max-width: 820px; margin: auto; font-size: 20px; line-height: 1.5; }
    .fixation { font-size: 48px; }
    .response-buttons { display: flex; justify-content: center; gap: 28px; margin-top: 30px; }
    .response-button { font-size: 22px; padding: 18px 42px; border: 2px solid #333; border-radius: 10px; background: white; cursor: pointer; }
    .response-button:hover { background: #e9e9e9; }
    .small { font-size: 16px; color: #555; }

    .panel { max-width: 760px; margin: auto; padding: 28px 34px; background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: left; }
    .panel h2 { text-align: center; margin-top: 0; }
    .field { margin: 22px 0; }
    .field > label:first-child { display: block; font-weight: 700; margin-bottom: 9px; }
    .field input[type="text"], .field input[type="number"] { width: 100%; max-width: 420px; font-size: 18px; padding: 10px 12px; border: 1px solid #aaa; border-radius: 8px; box-sizing: border-box; }
    .radio-row { display: flex; flex-wrap: wrap; gap: 10px 18px; }
    .radio-row label { display: inline-flex; align-items: center; gap: 7px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 9px; background: #fafafa; cursor: pointer; }
    .radio-row label:hover { background: #f0f0f0; }
    .error { min-height: 24px; margin-top: 14px; font-weight: 700; color: #b00020; text-align: center; }
    .btn-std { font-size: 18px; padding: 12px 30px; border-radius: 8px; }
    code { background: #eee; padding: 2px 5px; border-radius: 4px; }
  </style>
</head>
<body></body>
<script>

// ===========================
// CONFIG TO EDIT IF NEEDED
// ===========================
const CONTINUUM = "stim64";
const N_STEPS = 17;
const AUDIO_EXTENSION = ".wav";

// "" = audio files in the same folder as the HTML file.
// "audio/" = audio files in an audio subfolder.
const AUDIO_BASE_PATH = "";

const DATAPIPE_EXPERIMENT_ID = "QTT9TJh6MSY0";
const PROLIFIC_COMPLETION_URL = "https://app.prolific.com/submissions/complete?cc=C3W7VDR6";
const ITI_MS = 800;
const FIXATION_MS = 500;

function audioPath(stimName) {
  return `${AUDIO_BASE_PATH}${stimName}${AUDIO_EXTENSION}`;
}

function makePair(i, j) {
  const stim1 = `${CONTINUUM}_${i}`;
  const stim2 = `${CONTINUUM}_${j}`;
  return {
    continuum: CONTINUUM,
    stim1: stim1,
    stim2: stim2,
    stim1_step: i,
    stim2_step: j,
    correct_response: i === j ? "same" : "different",
    audio1: audioPath(stim1),
    audio2: audioPath(stim2),
    pair_id: `${stim1}__${stim2}`
  };
}

function makeUniquePairsWithDiagonal() {
  const pairs = [];
  for (let i = 1; i <= N_STEPS; i++) {
    for (let j = i; j <= N_STEPS; j++) {
      pairs.push(makePair(i, j));
    }
  }
  return pairs;
}

const TEST_TRIALS = makeUniquePairsWithDiagonal(); // 17 * 18 / 2 = 153 trials
const AUDIO_FILES = Array.from({ length: N_STEPS }, (_, k) => audioPath(`${CONTINUUM}_${k + 1}`));
AUDIO_FILES.push(
  AUDIO_BASE_PATH + "2.wav",
  AUDIO_BASE_PATH + "7.wav"
);
// --------------------------------------------------
// Catch trials
// --------------------------------------------------
const CATCH_TRIALS = [
  {
    continuum: CONTINUUM,
    stim1: "2",
    stim2: "2",
    stim1_step: "catch2",
    stim2_step: "catch2",
    correct_response: "same",
    audio1: AUDIO_BASE_PATH + "2.wav",
    audio2: AUDIO_BASE_PATH + "2.wav",
    pair_id: "catch_2_2",
    catch_trial: true
  },
  {
    continuum: CONTINUUM,
    stim1: "7",
    stim2: "7",
    stim1_step: "catch7",
    stim2_step: "catch7",
    correct_response: "same",
    audio1: AUDIO_BASE_PATH + "7.wav",
    audio2: AUDIO_BASE_PATH + "7.wav",
    pair_id: "catch_7_7",
    catch_trial: true
  },
  {
    continuum: CONTINUUM,
    stim1: "2",
    stim2: "7",
    stim1_step: "catch2",
    stim2_step: "catch7",
    correct_response: "different",
    audio1: AUDIO_BASE_PATH + "2.wav",
    audio2: AUDIO_BASE_PATH + "7.wav",
    pair_id: "catch_2_7",
    catch_trial: true
  }
];

function getUrlParam(name) {
  return new URLSearchParams(window.location.search).get(name) || "";
}


function getRadioValue(name) {
  const checked = document.querySelector(`input[name="${name}"]:checked`);
  return checked ? checked.value : "";
}

const participant_info = {
  prolific_id: getUrlParam("PROLIFIC_PID"),
  study_id: getUrlParam("STUDY_ID"),
  session_id: getUrlParam("SESSION_ID"),
  continuum: CONTINUUM
};

const jsPsych = initJsPsych({
  show_progress_bar: true,
  auto_update_progress_bar: true,
  on_finish: function() {
    if (DATAPIPE_EXPERIMENT_ID === "PUT_YOUR_DATAPIPE_EXPERIMENT_ID_HERE") {
      jsPsych.data.get().localSave('csv', `audio_similarity_${CONTINUUM}_${participant_info.prolific_id || 'no_prolific_id'}.csv`);
    }
  }
});

const timeline = [];

timeline.push({
  type: jsPsychPreload,
  audio: AUDIO_FILES,
  message: '<div class="task-box"><p>Loading sounds...</p><p class="small">Please wait.</p></div>',
  error_message: `<div class="task-box"><p><strong>Some audio files could not be loaded.</strong></p><p>Please check the filenames and the value of <code>AUDIO_BASE_PATH</code>.</p><p class="small">Current base path: <code>${AUDIO_BASE_PATH || "same folder as HTML"}</code></p></div>`,
  continue_after_error: false
});

timeline.push({
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="panel">
      <h2>Participant information</h2>

      <div class="field">
        <label>Gender</label>
        <div class="radio-row">
          <label><input type="radio" name="gender" value="female"> female</label>
          <label><input type="radio" name="gender" value="male"> male</label>
          <label><input type="radio" name="gender" value="non-binary"> non-binary</label>
          <label><input type="radio" name="gender" value="prefer not to say"> prefer not to say</label>
        </div>
      </div>

      <div class="field">
        <label for="age">Age (enter a number)</label>
        <input type="text" id="age" autocomplete="off" inputmode="numeric">
      </div>

      <div class="field">
        <label for="prolific_id">What is your Prolific ID?</label>
        <input type="text" id="prolific_id" autocomplete="off" value="${participant_info.prolific_id}">
      </div>

      <div class="field">
        <label>What is your connection to music?</label>
        <div class="radio-row">
          <label><input type="radio" name="music_connection" value="musician"> musician</label>
          <label><input type="radio" name="music_connection" value="audio professional"> audio professional</label>
          <label><input type="radio" name="music_connection" value="neither"> neither</label>
        </div>
      </div>

      <div class="field">
        <label>Which hand do you use?</label>
        <div class="radio-row">
          <label><input type="radio" name="handedness" value="right"> right</label>
          <label><input type="radio" name="handedness" value="left"> left</label>
        </div>
      </div>

      <div class="field">
        <label>Do you have headphones?</label>
        <div class="radio-row">
          <label><input type="radio" name="headphones" value="yes"> yes</label>
          <label><input type="radio" name="headphones" value="no"> no</label>
        </div>
      </div>

      <div id="demo-error" class="error"></div>
    </div>
  `,
  choices: ["NEXT"],
  button_html: '<button class="jspsych-btn btn-std">%choice%</button>',
  on_load: function() {
    const btn = document.querySelector(".jspsych-btn");
    btn.addEventListener("click", function(event) {
      event.stopImmediatePropagation();

      const participant = {
        gender: getRadioValue("gender"),
        age: document.getElementById("age").value.trim(),
        prolific_id_typed: document.getElementById("prolific_id").value.trim(),
        music_connection: getRadioValue("music_connection"),
        handedness: getRadioValue("handedness"),
        headphones: getRadioValue("headphones")
      };

      if (Object.values(participant).some(v => !v)) {
        document.getElementById("demo-error").textContent = "Please complete all required fields.";
        return;
      }
      if (!/^\d+$/.test(participant.age) || Number(participant.age) < 18 || Number(participant.age) > 99) {
        document.getElementById("demo-error").textContent = "Please enter age as a number between 18 and 99.";
        return;
      }

      jsPsych.data.addProperties(participant);
      jsPsych.finishTrial({
        section: "participant_information",
        timestamp_ms: Math.round(performance.now()),
        ...participant,
        ...participant_info
      });
    }, true);
  },
  data: { section: 'participant_information', ...participant_info }
});

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="task-box">
    <h2>Audio Similarity Detection Task</h2>
    <p>You will hear sounds of a person drawing shapes on a table.</p>
    <p>You will hear 2 sounds, imagine the shapes, then decide whether the 2 shapes are the <strong>same</strong> or <strong>different</strong>.</p>
    <p>You can click the buttons or use the keyboard:</p>
    <p><strong>Left arrow = Same</strong><br><strong>Right arrow = Different</strong></p>
    <p class="small">Please use headphones and keep your volume at a comfortable level.</p>
    <p>Press any key to start.</p>
  </div>`,
  choices: 'ALL_KEYS',
  data: { section: 'instructions', ...participant_info }
});

function responseTrial(pair) {
  let trialStart = null;
  return {
    type: jsPsychHtmlKeyboardResponse,
    choices: ['ArrowLeft', 'ArrowRight'],
    stimulus: `<div class="task-box">
      <h2>Same or different?</h2>
      <div class="response-buttons">
        <button id="same-btn" class="response-button">Same<br><span class="small">← left</span></button>
        <button id="different-btn" class="response-button">Different<br><span class="small">right →</span></button>
      </div>
    </div>`,
    on_load: function() {
      trialStart = performance.now();
      document.getElementById('same-btn').addEventListener('click', () => {
        jsPsych.finishTrial({ response: 'button_same', rt: Math.round(performance.now() - trialStart) });
      });
      document.getElementById('different-btn').addEventListener('click', () => {
        jsPsych.finishTrial({ response: 'button_different', rt: Math.round(performance.now() - trialStart) });
      });
    },
    on_finish: function(data) {
      const raw = data.response;
      let response_clean = null;
      if (raw === 'arrowleft' || raw === 'ArrowLeft' || raw === 'button_same') response_clean = 'same';
      if (raw === 'arrowright' || raw === 'ArrowRight' || raw === 'button_different') response_clean = 'different';
      data.raw_response = raw;
      data.response_clean = response_clean;
      data.correct = response_clean === pair.correct_response;
    },
    data: {
      section: 'response',
      ...participant_info,
      ...pair
    }
  };
}

const ALL_TRIALS = TEST_TRIALS.concat(CATCH_TRIALS);
const randomizedPairs = jsPsych.randomization.shuffle(ALL_TRIALS);
randomizedPairs.forEach((pair, idx) => {
  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div class="fixation">+</div>',
    choices: 'NO_KEYS',
    trial_duration: FIXATION_MS,
    data: { section: 'fixation', trial_index: idx + 1, ...participant_info, ...pair }
  });

  timeline.push({
    type: jsPsychAudioKeyboardResponse,
    stimulus: pair.audio1,
    choices: 'NO_KEYS',
    trial_ends_after_audio: true,
    data: { section: 'audio1', trial_index: idx + 1, ...participant_info, ...pair }
  });

  timeline.push({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '',
    choices: 'NO_KEYS',
    trial_duration: ITI_MS,
    data: { section: 'iti', trial_index: idx + 1, ...participant_info, ...pair }
  });

  timeline.push({
    type: jsPsychAudioKeyboardResponse,
    stimulus: pair.audio2,
    choices: 'NO_KEYS',
    trial_ends_after_audio: true,
    data: { section: 'audio2', trial_index: idx + 1, ...participant_info, ...pair }
  });

  timeline.push(responseTrial(pair));
});

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="task-box"><h2>Thank you!</h2><p>Your data are being saved.</p></div>`,
  choices: 'NO_KEYS',
  trial_duration: 1000,
  data: { section: 'end_screen', ...participant_info }
});

if (DATAPIPE_EXPERIMENT_ID !== "PUT_YOUR_DATAPIPE_EXPERIMENT_ID_HERE") {
  timeline.push({
    type: jsPsychPipe,
    action: "save",
    experiment_id: DATAPIPE_EXPERIMENT_ID,
    filename: `audio_similarity_${CONTINUUM}_${participant_info.prolific_id || 'no_prolific_id'}_${Date.now()}.csv`,
    data_string: () => jsPsych.data.get().csv()
  });
}

timeline.push({
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `<div class="task-box"><h2>Finished</h2><p>You can now return to Prolific.</p></div>`,
  choices: 'NO_KEYS',
  trial_duration: 1000,
  on_finish: function() {
    if (PROLIFIC_COMPLETION_URL !== "PUT_YOUR_PROLIFIC_COMPLETION_URL_HERE") {
      window.location.href = PROLIFIC_COMPLETION_URL;
    }
  },
  data: { section: 'redirect', ...participant_info }
});

jsPsych.run(timeline);

</script>
</html>
